# Configuration file for running BabyBench environments. See wiki for details:
# https://babybench.github.io/2025/API/

# --- General options --- #

save_dir : results
behavior : none               # options: none, self_touch, hand_regard
scene : crib                  # options: base, crib, cubes
max_episode_steps : 10_000
frame_skip : 1
render_size : 480
save_logs_every: 1000
render: True

# --- Sensory modalities --- #

# Proprioception
proprio_velocity : True
proprio_torque : True
proprio_limits : True
proprio_actuation : True

# Vestibular
vestibular_active : False

# Vision
vision_active : False
vision_resolution : 64

# Touch - off, just proprioception
touch_active : False
touch_scale : 5.
touch_function : force_vector
touch_response : spread_linear
# touch_hands : True
# touch_fingers : True
# touch_arms : True
# touch_feet : True
# touch_legs : True
# touch_body : True
# touch_head : True
# touch_eyes : False

# --- Motor modality --- #

# Actuation model
actuation_model : spring_damper  # options: spring_damper, muscle, positional
#actuation_model: positional

# Actuate joints
act_hands : True
act_fingers : True
act_arms : True
act_feet : False
act_legs : False
act_body : False
act_head : False
act_eyes : False

# Lock joints
lock_hands : False
lock_fingers : False
lock_arms : False
lock_feet : True
lock_legs : False
lock_body : False
lock_head : False
lock_eyes : True
